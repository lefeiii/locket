<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>locket admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--ink:#2e2030;--mid:#9a7888;--tomato:#E8736A;--cream:#FEF8F2;--font-b:'Baloo 2',sans-serif;--font-n:'Nunito',sans-serif}
    body{font-family:var(--font-n);background:var(--cream);color:var(--ink);min-height:100vh}

    /* Auth screen */
    #auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:16px}
    .admin-logo{font-family:var(--font-b);font-size:28px;font-weight:800;color:var(--ink)}
    .admin-sub{font-size:13px;color:var(--mid);font-weight:700}
    .admin-input{width:100%;max-width:320px;border:1.5px solid rgba(200,180,190,0.3);border-radius:12px;padding:12px 16px;font-size:14px;font-family:var(--font-n);background:#fff;outline:none}
    .admin-btn{background:var(--ink);color:#fff;border:none;border-radius:999px;padding:12px 32px;font-size:14px;font-weight:800;font-family:var(--font-n);cursor:pointer}
    .admin-error{font-size:12px;color:var(--tomato);font-weight:700}

    /* Main panel */
    #panel{display:none;max-width:800px;margin:0 auto;padding:24px 16px 80px}
    .panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(200,180,190,0.2)}
    .panel-title{font-family:var(--font-b);font-size:22px;font-weight:800}
    .panel-actions{display:flex;gap:8px}
    .btn-sm{border:1.5px solid rgba(200,180,190,0.3);background:#fff;color:var(--ink);border-radius:999px;padding:7px 16px;font-size:12px;font-weight:800;font-family:var(--font-n);cursor:pointer}
    .btn-sm.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
    .btn-sm.danger{background:var(--tomato);color:#fff;border-color:var(--tomato)}

    /* Tabs */
    .tabs{display:flex;gap:8px;margin-bottom:20px}
    .tab{border:1.5px solid rgba(200,180,190,0.25);background:rgba(255,255,255,0.7);color:var(--mid);border-radius:999px;padding:7px 16px;font-size:12px;font-weight:800;font-family:var(--font-n);cursor:pointer}
    .tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

    /* Status banner */
    .status-bar{background:rgba(109,204,148,0.12);border:1px solid rgba(109,204,148,0.3);border-radius:12px;padding:10px 14px;font-size:12px;font-weight:700;color:#1a7a48;margin-bottom:16px;display:none}
    .status-bar.error{background:rgba(232,115,106,0.1);border-color:rgba(232,115,106,0.3);color:var(--tomato)}

    /* Draft card */
    .draft-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:16px;border:1.5px solid rgba(200,180,190,0.18);box-shadow:0 2px 8px rgba(46,32,48,0.06)}
    .draft-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
    .draft-cat{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.1em;color:var(--mid);margin-bottom:4px}
    .draft-title{font-family:var(--font-b);font-size:16px;font-weight:800;color:var(--ink)}
    .draft-actions{display:flex;gap:6px;flex-shrink:0}
    .draft-field{margin-bottom:10px}
    .draft-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;color:var(--mid);margin-bottom:4px}
    .draft-val{font-size:13px;font-weight:700;color:var(--ink);line-height:1.5}
    .editable{border:1.5px solid rgba(200,180,190,0.25);border-radius:10px;padding:8px 12px;font-size:13px;font-family:var(--font-n);width:100%;background:rgba(254,248,242,0.7);outline:none;font-weight:700;color:var(--ink);resize:vertical}
    .editable:focus{border-color:rgba(220,120,140,0.4)}
    .price-row{display:flex;gap:8px}
    .price-row .editable{flex:1}

    /* Live cards */
    .live-card{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;border:1.5px solid rgba(200,180,190,0.18);display:flex;align-items:center;gap:12px}
    .live-card-info{flex:1;min-width:0}
    .live-card-title{font-weight:800;font-size:14px;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .live-card-meta{font-size:11px;color:var(--mid);font-weight:700;margin-top:2px}

    /* Empty states */
    .empty-state{text-align:center;padding:48px 0;color:var(--mid);font-size:13px;font-weight:700}
    .empty-state .emoji{font-size:32px;margin-bottom:8px}

    .spinner{display:inline-block;width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<!-- Auth -->
<div id="auth-screen">
  <div class="admin-logo">locket 🩷</div>
  <div class="admin-sub">admin panel — sign in with your account</div>
  <input class="admin-input" id="admin-email" type="email" placeholder="email"/>
  <input class="admin-input" id="admin-pass"  type="password" placeholder="password"/>
  <button class="admin-btn" onclick="signIn()">sign in</button>
  <div class="admin-error" id="auth-error"></div>
</div>

<!-- Panel -->
<div id="panel">
  <div class="panel-header">
    <div class="panel-title">locket admin 🩷</div>
    <div class="panel-actions">
      <button class="btn-sm" onclick="triggerGenerate(this)">✨ generate now</button>
      <button class="btn-sm" onclick="signOut()">sign out</button>
    </div>
  </div>

  <div id="status-bar" class="status-bar"></div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('drafts',this)">📝 drafts (<span id="draft-count">0</span>)</button>
    <button class="tab" onclick="showTab('live',this)">✅ live (<span id="live-count">0</span>)</button>
  </div>

  <div id="tab-drafts">
    <div id="drafts-loading" class="empty-state"><div class="emoji">⏳</div>loading drafts...</div>
    <div id="drafts-empty"  class="empty-state" style="display:none"><div class="emoji">🎉</div>no drafts — all caught up!</div>
    <div id="drafts-list"></div>
  </div>

  <div id="tab-live" style="display:none">
    <div id="live-loading" class="empty-state"><div class="emoji">⏳</div>loading live posts...</div>
    <div id="live-empty"  class="empty-state" style="display:none"><div class="emoji">📭</div>no live posts yet</div>
    <div id="live-list"></div>
  </div>
</div>

<script type="module">
import { initializeApp }         from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut as fbSignOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
import { getFirestore, collection, query, where, orderBy, limit, onSnapshot, doc, updateDoc, deleteDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyBUNvLE5ZW2mDQpwsHh4hwq8YvVurBP16U",
  authDomain:        "locket-9b5ae.firebaseapp.com",
  projectId:         "locket-9b5ae",
  storageBucket:     "locket-9b5ae.firebasestorage.app",
  messagingSenderId: "252742374185",
  appId:             "1:252742374185:web:9219405e65dd9060989d38"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const CAT_LABELS = { drink:'☕ drinks', beauty:'💄 beauty', deals:'🛍️ deals', worthy:'✅ worth it?' };

let unsubDrafts = null, unsubLive = null;

// ── AUTH ──────────────────────────────────────────
onAuthStateChanged(auth, user => {
  if (user) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('panel').style.display       = 'block';
    loadDrafts();
    loadLive();
  } else {
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('panel').style.display       = 'none';
  }
});

window.signIn = async () => {
  const email = document.getElementById('admin-email').value;
  const pass  = document.getElementById('admin-pass').value;
  const errEl = document.getElementById('auth-error');
  errEl.textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) {
    errEl.textContent = e.message;
  }
};

window.signOut = () => fbSignOut(auth);

// ── TABS ──────────────────────────────────────────
window.showTab = (tab, btn) => {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-drafts').style.display = tab === 'drafts' ? 'block' : 'none';
  document.getElementById('tab-live').style.display   = tab === 'live'   ? 'block' : 'none';
};

// ── DRAFTS ────────────────────────────────────────
function loadDrafts() {
  if (unsubDrafts) unsubDrafts();
  // No orderBy — avoids needing a composite Firestore index
  const q = query(collection(db,'trendPosts'), where('approved','==',false), limit(60));
  unsubDrafts = onSnapshot(q, snap => {
    document.getElementById('drafts-loading').style.display = 'none';
    document.getElementById('draft-count').textContent = snap.size;
    const list = document.getElementById('drafts-list');
    list.innerHTML = '';
    if (snap.empty) { document.getElementById('drafts-empty').style.display = 'block'; return; }
    document.getElementById('drafts-empty').style.display = 'none';
    // Sort client-side newest first
    const docs = snap.docs.slice().sort((a,b) => {
      const ta = a.data().createdAt?.seconds || 0;
      const tb = b.data().createdAt?.seconds || 0;
      return tb - ta;
    });
    docs.forEach(d => list.appendChild(buildDraftCard(d.id, d.data())));
  }, err => {
    console.error('loadDrafts error:', err);
    document.getElementById('drafts-loading').style.display = 'none';
    document.getElementById('drafts-list').innerHTML = '<div style="color:red;padding:12px;font-size:13px;">error loading drafts: ' + err.message + '</div>';
  });
}

function buildDraftCard(id, p) {
  const div = document.createElement('div');
  div.className = 'draft-card';
  div.id = 'draft-' + id;
  div.innerHTML = `
    <div class="draft-top">
      <div>
        <div class="draft-cat">${CAT_LABELS[p.category] || p.category}</div>
        <div class="draft-title">${esc(p.title)}</div>
      </div>
      <div class="draft-actions">
        <button class="btn-sm primary" onclick="approve('${id}',this)">✓ approve</button>
        <button class="btn-sm danger"  onclick="reject('${id}',this)">✗ reject</button>
      </div>
    </div>
    <div class="draft-field">
      <div class="draft-label">description</div>
      <textarea class="editable" id="${id}-desc" rows="3">${esc(p.description||'')}</textarea>
    </div>
    <div class="price-row">
      <div class="draft-field" style="flex:1">
        <div class="draft-label">original price</div>
        <input class="editable" id="${id}-orig" value="${esc(p.originalPrice||'')}"/>
      </div>
      <div class="draft-field" style="flex:1">
        <div class="draft-label">locket price / dupe</div>
        <input class="editable" id="${id}-lp" value="${esc(p.locketPrice||'')}"/>
      </div>
      <div class="draft-field" style="flex:1">
        <div class="draft-label">savings</div>
        <input class="editable" id="${id}-sv" value="${esc(p.savings||'')}"/>
      </div>
    </div>
    <div class="draft-field">
      <div class="draft-label">where to find it</div>
      <input class="editable" id="${id}-where" value="${esc(p.where||'')}"/>
    </div>
    <div class="draft-field">
      <div class="draft-label">link (optional)</div>
      <input class="editable" id="${id}-link" value="${esc(p.link||'')}"/>
    </div>
    <div class="draft-field">
      <div class="draft-label">image url${p.imageUrl ? ' ✅' : ' ⚠️ missing — paste a direct .jpg or .png url'}</div>
      ${p.imageUrl ? `<img src="${esc(p.imageUrl)}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:6px;" onerror="this.style.display='none'"/>` : ''}
      <input class="editable" id="${id}-img" value="${esc(p.imageUrl||'')}" placeholder="https://i.imgur.com/... or paste image url"/>
    </div>
  `;
  return div;
}

window.approve = async (id, btn) => {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>approving...';
  try {
    const desc  = document.getElementById(id+'-desc')?.value?.trim();
    const orig  = document.getElementById(id+'-orig')?.value?.trim();
    const lp    = document.getElementById(id+'-lp')?.value?.trim();
    const sv    = document.getElementById(id+'-sv')?.value?.trim();
    const where = document.getElementById(id+'-where')?.value?.trim();
    const link  = document.getElementById(id+'-link')?.value?.trim();
    const imgUrl = document.getElementById(id+'-img')?.value?.trim();
    const updates = { approved: true, publishedAt: Timestamp.now() };
    if (desc)  updates.description   = desc;
    if (orig)  updates.originalPrice = orig;
    if (lp)    updates.locketPrice   = lp;
    if (sv)    updates.savings       = sv;
    if (where) updates.where         = where;
    if (link)    updates.link          = link;
    if (imgUrl)  updates.imageUrl       = imgUrl;
    await updateDoc(doc(db,'trendPosts',id), updates);
    showStatus('✅ post approved and live!');
  } catch(e) {
    showStatus('error: ' + e.message, true);
    btn.disabled = false;
    btn.innerHTML = '✓ approve';
  }
};

window.reject = async (id, btn) => {
  if (!confirm('delete this draft?')) return;
  btn.disabled = true;
  try {
    await deleteDoc(doc(db,'trendPosts',id));
    showStatus('🗑️ draft deleted');
  } catch(e) {
    showStatus('error: ' + e.message, true);
    btn.disabled = false;
  }
};

// ── LIVE ──────────────────────────────────────────
function loadLive() {
  if (unsubLive) unsubLive();
  // No orderBy — avoids composite index. Sort client-side instead.
  const q = query(collection(db,'trendPosts'), where('approved','==',true), limit(60));
  unsubLive = onSnapshot(q, snap => {
    document.getElementById('live-loading').style.display = 'none';
    document.getElementById('live-count').textContent = snap.size;
    const list = document.getElementById('live-list');
    list.innerHTML = '';
    if (snap.empty) { document.getElementById('live-empty').style.display = 'block'; return; }
    document.getElementById('live-empty').style.display = 'none';
    const liveDocs = snap.docs.slice().sort((a,b) => {
      const ta = a.data().publishedAt?.seconds || 0;
      const tb = b.data().publishedAt?.seconds || 0;
      return tb - ta;
    });
    liveDocs.forEach(d => {
      const p = d.data();
      const el = document.createElement('div');
      el.className = 'live-card';
      const ts = p.publishedAt?.toDate?.()?.toLocaleDateString('en-CA',{month:'short',day:'numeric'}) || '';
      el.innerHTML = `
        <div style="font-size:20px;">${{drink:'☕',beauty:'💄',deals:'🛍️',worthy:'✅'}[p.category]||'✨'}</div>
        <div class="live-card-info">
          <div class="live-card-title">${esc(p.title)}</div>
          <div class="live-card-meta">${CAT_LABELS[p.category]||''} · ${ts}</div>
        </div>
        <button class="btn-sm danger" onclick="unpublish('${d.id}',this)">unpublish</button>
      `;
      list.appendChild(el);
    });
  }, err => {
    document.getElementById('live-loading').style.display = 'none';
    document.getElementById('live-list').innerHTML = '<div style="color:red;padding:12px;font-size:13px;">error: ' + err.message + '</div>';
  });
}

window.unpublish = async (id, btn) => {
  if (!confirm('unpublish this post?')) return;
  btn.disabled = true;
  try {
    await updateDoc(doc(db,'trendPosts',id), { approved: false, publishedAt: null });
    showStatus('post moved back to drafts');
  } catch(e) {
    showStatus('error: ' + e.message, true);
    btn.disabled = false;
  }
};

// ── MANUAL TRIGGER ────────────────────────────────
window.triggerGenerate = async (btn) => {
  if (!confirm('generate new posts now? this will use API credits (~$0.10).')) return;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> generating...';
  try {
    const token = await auth.currentUser.getIdToken();
    const res = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', authorization: `Bearer ${token}` },
      body: JSON.stringify({ action: 'trigger' })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showStatus(data.message || `✨ drafted ${data.drafted || '?'} posts — check drafts tab!`);
  } catch(e) {
    showStatus('error: ' + e.message, true);
  }
  btn.disabled = false;
  btn.innerHTML = '✨ generate now';
};

// ── UTILS ─────────────────────────────────────────
function showStatus(msg, isError) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar' + (isError ? ' error' : '');
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
